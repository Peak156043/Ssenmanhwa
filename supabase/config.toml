# Supabase CLI local development config.
# Generated for the manhwa reading platform — local dev only.
# Full reference: https://supabase.com/docs/guides/local-development/cli/config

project_id = "manhwa-app"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

# Local inbound email testing UI (Inbucket) — lets you see signup
# confirmation emails without configuring real SMTP during dev.
[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "20MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["http://127.0.0.1:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
# Turned off for local dev so signup -> immediate login works without
# clicking a confirmation link from Inbucket. Turn this ON before deploying
# anywhere real users sign up (see README "production checklist").
enable_confirmations = false

[edge_runtime]
enabled = false

[analytics]
enabled = false
